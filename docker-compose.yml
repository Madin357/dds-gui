version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dds
      POSTGRES_PASSWORD: dds_dev_password
      POSTGRES_DB: dds_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dds"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./mock-sources:/mock-sources
    environment:
      - DATABASE_URL=postgresql+asyncpg://dds:dds_dev_password@postgres:5432/dds_platform
      - DATABASE_URL_SYNC=postgresql://dds:dds_dev_password@postgres:5432/dds_platform
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - MOCK_SOURCES_PATH=/mock-sources
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./mock-sources:/mock-sources
    environment:
      - DATABASE_URL=postgresql+asyncpg://dds:dds_dev_password@postgres:5432/dds_platform
      - DATABASE_URL_SYNC=postgresql://dds:dds_dev_password@postgres:5432/dds_platform
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - MOCK_SOURCES_PATH=/mock-sources
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./mock-sources:/mock-sources
    environment:
      - DATABASE_URL=postgresql+asyncpg://dds:dds_dev_password@postgres:5432/dds_platform
      - DATABASE_URL_SYNC=postgresql://dds:dds_dev_password@postgres:5432/dds_platform
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - MOCK_SOURCES_PATH=/mock-sources
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
